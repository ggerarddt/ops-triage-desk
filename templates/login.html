<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Triage Desk - Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .login-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            font-size: 1.4rem;
            margin-bottom: 0.25rem;
            color: #1a1a2e;
        }
        .login-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #444;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 2px rgba(74,108,247,0.15);
        }
        .btn {
            width: 100%;
            padding: 0.7rem;
            background: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: #3451d1; }
        .flash-messages {
            margin-bottom: 1rem;
        }
        .flash {
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .flash.danger { background: #ffe0e0; color: #900; }
        .flash.warning { background: #fff3cd; color: #856404; }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.info { background: #d1ecf1; color: #0c5460; }
        .policy-banner {
            background: #fff3cd;
            border-left: 4px #ffc107;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #856404;
            max-width: 400px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Incident Triage Desk</h1>
        <p>Sign in to submit or review incidents.</p>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}
        </div>

        <div class="policy-banner">
            <p>This tool is for internal decision support. Final ownership remains with human operators.</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
</body>
</html>
