<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Triage Desk - Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f9; color: #333; line-height: 1.6; }
        .navbar { background: #2c3e50; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; flex-wrap: wrap; }
        .navbar .brand { font-weight: 700; }
        .navbar .nav-links a { color: #ecf0f1; text-decoration: none; margin-left: 1.5rem; }
        .navbar .nav-links a:hover { color: #3498db; }
        .container { max-width: 700px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { margin-bottom: 1rem; }
        .placeholder { background: #fff; border: 2px dashed #ccc; border-radius: 8px; padding: 3rem; text-align: center; color: #999; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Incident Triage Desk</div>
        <div class="nav-links">
            <a href="{{ url_for('triage') }}">Triage</a>
            <a href="{{ url_for('audit') }}">Audit</a>
            <a href="{{ url_for('admin') }}">Admin</a>
            <a href="{{ url_for('logout') }}">Logout ({{ session.username }})</a>
        </div>
    </nav>

    <div class="container">
        <h1>Admin Panel</h1>
        <div class="placeholder">
            <p>Admin functionality will be expanded in a future prompt (team management, escalation policies).</p>
        </div>
    </div>
</body>
</html>
